name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      # ---------- Checkout ----------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0               # Get the full history
          submodules: true              # If you use any submodules
          persist-credentials: false    # Prevent credential leakage

      # ---------- Cache dependencies ----------
      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: ~/.npm               # NPM cache folder
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ---------- Set up Node ----------
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'               # Enables built‑in npm cache handling

      # ---------- Install dependencies ----------
      - name: Install dependencies
        run: |
          # If a lock file exists we can use the faster ci command
          if [ -f package-lock.json ] || [ -f yarn.lock ]; then
            echo "🔒 Lock file found – using npm ci"
            npm ci
          else
            echo "⚠️ No lock file – falling back to npm install"
            npm install   # This will generate a lock file for the next run
          fi

      # ---------- Build & Export ----------
      - name: Lint (optional)
        run: npm run lint || true   # Lint failures won’t break the build

      - name: Build application
        run: npm run build

      - name: Static Export
        run: npm run export

      # ---------- Deploy to GitHub Pages ----------
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
        with:
          directory: ./out

  # ---------- Preview Deploy (for PRs) ----------
  preview-deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: |
          # Same graceful fallback logic as above
          if [ -f package-lock.json ] || [ -f yarn.lock ]; then
            echo "🔒 Lock file found – using npm ci"
            npm ci --no-audit
          else
            echo "⚠️ No lock file – falling back to npm install"
            npm install --no-audit   # Generates a lock file for next time
          npm run build
          npm run export

      - name: Deploy Preview
        uses: actions/deploy-pages@v4
        with:
          directory: ./out
          github_token: ${{ secrets.GITHUB_TOKEN }}
          keep_history: true
          force_orphan: true
