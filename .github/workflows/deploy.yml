name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-while: 72h

      - name: Clean node_modules
        run: |
          rm -rf node_modules/ package-lock.json *.log
          mkdir -p node_modules && cd node_modules
          # Create placeholder lock files
          touch ../package-lock.json
          touch ./yarn.lock

      - name: Install dependencies
        run: npm update || npm ci

      - name: Build application
        run: npm run build

      - name: Static Export
        run: npm run export

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
        with:
          directory: ./out

  preview-deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --no-audit
          # If installed via 'npm update', ensure lock file exists
          test -f package-lock.json && npm ci --prefer-lockfile

      - name: Build and Export
        run: |
          npm run build
          npm run export

      - name: Deploy Preview
        uses: actions/deploy-pages@v4
        with:
          directory: ./out
          github_token: ${{ secrets.GITHUB_TOKEN }}
          keep_history: true
          force_orphan: true
